name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually run this workflow from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial permission to allow pushing to GHCR

    steps:
    # 1. Checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v7

    # 2. Set up the Go environment
    - name: Set up Go
      uses: actions/setup-go@v6.5.0
      with:
        go-version: '1.26.4' # Change this to match your Go version

    # 3. Build the Go binary for Raspberry Pi 4 (ARM64)
    - name: Build Go Binary
      run: |
        GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ./build/hou-yi .

    # 4. Set up QEMU for multi-architecture Docker builds
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4.1.0

    # 5. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4.1.0

    # 6. Log in to GitHub Container Registry (GHCR)
    - name: Log in to GHCR
      uses: docker/login-action@v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=sha,format=short

    # 7. Build the Docker image and push to GHCR
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v7.2.0
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}